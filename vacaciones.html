<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacaciones · Aner & Iratxe</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-card: #1a2028;
    --bg-elevated: #232a34;
    --bg-input: #2a323d;
    --border: #2e3744;
    --border-soft: #242c37;
    --text: #e8ecf1;
    --text-dim: #9aa5b4;
    --text-faint: #6b7685;
    --accent: #5eead4;
    --accent-dim: #2dd4bf;
    --income: #4ade80;
    --expense: #f87171;
    --warning: #fbbf24;
    --info: #60a5fa;
    --shadow: 0 4px 12px rgba(0,0,0,0.25);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px 16px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding: 20px 16px;
    background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  header h1 {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* === SYNC INDICATOR === */
  .sync-indicator {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-dim);
    z-index: 100;
    box-shadow: var(--shadow);
    transition: all 0.25s ease;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.2s;
  }

  .sync-indicator.synced .sync-dot {
    background: var(--income);
    box-shadow: 0 0 8px rgba(74,222,128,0.5);
  }
  .sync-indicator.syncing .sync-dot {
    background: var(--warning);
    animation: pulse 1s infinite;
  }
  .sync-indicator.offline .sync-dot { background: var(--expense); }
  .sync-indicator.error .sync-dot {
    background: var(--expense);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @media (max-width: 500px) {
    .sync-indicator {
      top: 8px; right: 8px;
      padding: 4px 10px;
      font-size: 0.7rem;
    }
  }

  /* === LISTA DE VIAJES === */
  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .trip-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
    position: relative;
  }

  .trip-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .trip-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .trip-flag {
    font-size: 1.4rem;
  }

  .trip-name {
    font-size: 1.1rem;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .trip-dates {
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-bottom: 12px;
  }

  .trip-stat {
    margin-bottom: 8px;
    font-size: 0.85rem;
  }

  .trip-stat-label {
    color: var(--text-dim);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }

  .trip-stat-value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .trip-bar {
    height: 5px;
    background: var(--bg-input);
    border-radius: 3px;
    overflow: hidden;
    margin: 4px 0 8px;
  }

  .trip-bar-fill {
    height: 100%;
    background: var(--income);
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
  }

  .trip-card-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 4px;
  }

  .trip-card-action {
    background: transparent;
    border: none;
    color: var(--text-faint);
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.85rem;
    transition: color 0.15s;
  }

  .trip-card-action:hover { color: var(--accent); }
  .trip-card-action.danger:hover { color: var(--expense); }

  /* === DETALLE DE VIAJE === */
  .trip-detail {
    display: none;
  }

  .trip-detail.active {
    display: block;
  }

  .trips-list-section.hidden { display: none; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-family: inherit;
    margin-bottom: 12px;
    transition: all 0.15s;
  }

  .back-btn:hover { color: var(--accent); background: var(--bg-card); }

  .trip-detail-header {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-elevated));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  .trip-detail-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 1.4rem;
    font-weight: 600;
  }

  .trip-detail-meta {
    color: var(--text-dim);
    font-size: 0.88rem;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .trip-detail-meta-item {
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .trip-detail-meta-item:hover { background: var(--bg-input); }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .tab {
    padding: 10px 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* === SUMMARY (overview) === */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .summary-card-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .summary-card-value {
    font-size: 1.4rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .summary-card-value.positive { color: var(--income); }
  .summary-card-value.negative { color: var(--expense); }

  .summary-card-sub {
    font-size: 0.75rem;
    color: var(--text-faint);
    margin-top: 3px;
  }

  /* === SECTIONS === */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-wrap: wrap;
  }

  .section-title {
    font-size: 1rem;
    font-weight: 600;
  }

  .section-total {
    font-variant-numeric: tabular-nums;
    font-size: 1rem;
    font-weight: 700;
  }

  .section-total.expense { color: var(--expense); }

  /* === ITEM ROWS === */
  .item-row {
    display: flex;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border-soft);
    gap: 10px;
    min-height: 44px;
    transition: opacity 0.15s;
  }

  .item-row:last-child { border-bottom: none; }

  .item-row.done .item-concept,
  .item-row.done .item-amount {
    opacity: 0.45;
    text-decoration: line-through;
    text-decoration-color: var(--text-faint);
  }

  .check-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    font-size: 0.85rem;
    color: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-btn:hover { border-color: var(--accent); }
  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .item-cat-tag {
    font-size: 0.7rem;
    background: var(--bg-input);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 10px;
    cursor: pointer;
    flex-shrink: 0;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .item-cat-tag:hover { color: var(--accent); border-color: var(--accent); }

  .item-concept {
    flex: 1;
    min-width: 0;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.92rem;
  }
  .item-concept:hover { background: var(--bg-input); }

  .item-amount {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    font-size: 0.95rem;
    white-space: nowrap;
    color: var(--expense);
  }
  .item-amount:hover { background: var(--bg-input); }

  .item-delete {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    font-size: 1rem;
    line-height: 1;
    transition: all 0.15s;
  }
  .item-delete:hover { color: var(--expense); background: rgba(248,113,113,0.1); }

  .inline-edit {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: inherit;
    outline: none;
  }

  .inline-edit-amount {
    text-align: right;
    max-width: 130px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  /* === BUTTONS === */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent-dim); background: var(--bg-input); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

  .btn-sm { padding: 6px 10px; font-size: 0.8rem; }

  .btn-ghost {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    width: 100%;
    justify-content: center;
    padding: 12px;
    margin-top: 10px;
  }
  .btn-ghost:hover {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
  }

  /* === FORMS === */
  .form-row {
    display: grid;
    grid-template-columns: auto 1fr 130px auto auto;
    gap: 8px;
    padding: 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    margin-top: 10px;
    align-items: center;
  }

  .form-row select,
  .form-row input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-row select:focus, .form-row input:focus { border-color: var(--accent); }
  .form-row input[type="number"] { text-align: right; font-variant-numeric: tabular-nums; }

  @media (max-width: 700px) {
    .form-row {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .form-row select, .form-row input:nth-child(2) {
      grid-column: 1 / -1;
    }
  }

  /* === CATEGORIES BAR === */
  .categories-summary {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .cat-summary-card {
    background: var(--bg-elevated);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-soft);
  }

  .cat-summary-name {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cat-summary-amount {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--expense);
  }

  /* === FILTERS === */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .filter-pill {
    padding: 6px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--text-dim);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .filter-pill:hover { color: var(--text); }
  .filter-pill.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* === MODAL === */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-backdrop.active { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 520px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 12px 36px rgba(0,0,0,0.5);
  }

  .modal h2 {
    font-size: 1.15rem;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 5px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* === NOTAS === */
  .notes-textarea {
    width: 100%;
    min-height: 120px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.92rem;
    outline: none;
    resize: vertical;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: var(--accent); }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 0.88rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 300;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error { background: var(--expense); color: white; }

  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-faint);
    font-size: 0.95rem;
    font-style: italic;
  }

  .empty-state-cta {
    margin-top: 16px;
  }

  .hidden { display: none !important; }

  /* === DEADLINE BADGE === */
  .deadline-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .deadline-badge.urgent {
    background: rgba(248,113,113,0.15);
    color: var(--expense);
    border: 1px solid var(--expense);
  }

  .deadline-badge.soon {
    background: rgba(251,191,36,0.15);
    color: var(--warning);
  }

  .deadline-badge.future {
    background: var(--bg-input);
    color: var(--text-dim);
  }

  .deadline-badge.passed {
    background: var(--bg-input);
    color: var(--text-faint);
    text-decoration: line-through;
  }

  /* === LINKS HEADER === */
  .header-links {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .header-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.78rem;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    border: 1px solid var(--border);
  }
  .header-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* === AGENDA (cuadrícula días) === */
  .agenda-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }

  .day-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .day-card:hover { border-color: var(--accent-dim); }

  .day-card.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .day-card.past { opacity: 0.6; }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-soft);
  }

  .day-number {
    font-size: 0.75rem;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .day-date {
    font-size: 0.95rem;
    font-weight: 600;
  }

  .day-date-weekday {
    color: var(--text-dim);
    margin-right: 4px;
    text-transform: capitalize;
  }

  .day-today-badge {
    font-size: 0.65rem;
    background: var(--accent);
    color: var(--bg);
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .day-section-label {

      { text: 'Vacunas necesarias', cat: 'documentación' },
      { text: 'Seguro médico de viaje', cat: 'documentación' },
      { text: 'Reserva vuelos', cat: 'reservas' },
      { text: 'Reserva alojamiento', cat: 'reservas' },
      { text: 'Moneda local o tarjeta sin comisión', cat: 'preparación' },
      { text: 'Avisar al banco de las fechas del viaje', cat: 'preparación' },
      { text: 'Adaptador de enchufes', cat: 'preparación' },
      { text: 'Roaming o SIM local', cat: 'preparación' },

      { text: 'Botiquín básico', cat: 'preparación' }
    ]
  }
};

// === Estado ===
let state = loadStateFromCache();
let currentTripId = null;
let currentTab = 'overview';
let expenseFilter = 'all';

let isRemoteUpdate = false;
let saveTimer = null;
let syncStatus = 'connecting';
let firstLoadDone = false;

/* ---------- ESTADO ---------- */

function loadStateFromCache() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return ensureStateShape(JSON.parse(raw));
  } catch (e) { console.error('Error caché:', e); }
  return createDefaultState();
}

function createDefaultState() {
  return { trips: [] };
}

function ensureStateShape(s) {
  if (!s.trips) s.trips = [];
  s.trips.forEach(t => {
    if (!t.id) t.id = genId();
    if (!t.name) t.name = 'Viaje sin nombre';
    if (!t.flag) t.flag = '🌍';
    if (!t.startDate) t.startDate = '';
    if (!t.endDate) t.endDate = '';
    if (!t.travelers) t.travelers = 2;
    if (typeof t.budget !== 'number') t.budget = 0;
    if (!Array.isArray(t.categories)) t.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    if (!Array.isArray(t.expenses)) t.expenses = [];
    t.expenses.forEach(e => {
      if (!e.id) e.id = genId();
      if (e.done === undefined) e.done = false;
      if (!e.categoryId) e.categoryId = 'other';
      if (e.dayDate === undefined) e.dayDate = ''; // YYYY-MM-DD opcional
    });
    if (!Array.isArray(t.checklist)) t.checklist = [];
    t.checklist.forEach(c => {
      if (!c.id) c.id = genId();
      if (c.done === undefined) c.done = false;
      if (!c.deadline) c.deadline = '';
    });
    if (typeof t.notes !== 'string') t.notes = '';
    // Agenda: objeto con clave YYYY-MM-DD → { text: '', activities: [{id, text, done}] }
    if (typeof t.agenda !== 'object' || t.agenda === null || Array.isArray(t.agenda)) t.agenda = {};
    Object.keys(t.agenda).forEach(k => {
      const day = t.agenda[k];
      if (typeof day !== 'object' || day === null) {
        t.agenda[k] = { text: '', activities: [] };
        return;
      }
      if (typeof day.text !== 'string') day.text = '';
      if (!Array.isArray(day.activities)) day.activities = [];
      day.activities.forEach(a => {
        if (!a.id) a.id = genId();
        if (a.done === undefined) a.done = false;
        if (typeof a.text !== 'string') a.text = '';
      });
    });
    if (!t.createdAt) t.createdAt = Date.now();
  });
  return s;
}

function saveCache() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn('No se pudo guardar caché:', e); }
}

function saveState() {
  saveCache();
  if (isRemoteUpdate) return;
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(docRef, {
        data: state,
        lastUpdated: Date.now(),
        updatedBy: getClientId()
      });
      setSyncStatus('synced');
    } catch (err) {
      console.error('Error guardando:', err);
      setSyncStatus('error');
    }
  }, 400);
}

function getClientId() {
  let id = localStorage.getItem('vacaciones_clientId');
  if (!id) {
    id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    localStorage.setItem('vacaciones_clientId', id);
  }
  return id;
}

function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById('syncIndicator');
  const txt = document.getElementById('syncText');
  if (!el) return;
  el.classList.remove('synced', 'syncing', 'offline', 'error');
  el.classList.add(s);
  const messages = {
    connecting: 'Conectando...',
    syncing: 'Guardando...',
    synced: 'Sincronizado',
    offline: 'Sin conexión',
    error: 'Error al sincronizar'
  };
  txt.textContent = messages[s] || s;
}

function setupFirebaseListener() {
  onSnapshot(docRef, { includeMetadataChanges: true },
    (snapshot) => {
      const fromCache = snapshot.metadata.fromCache;
      const hasPending = snapshot.metadata.hasPendingWrites;

      if (!snapshot.exists()) {
        if (!firstLoadDone) {
          firstLoadDone = true;
          saveState();
        }
        return;
      }

      const remote = snapshot.data();
      if (!remote || !remote.data) return;
      if (remote.updatedBy === getClientId() && hasPending) return;

      isRemoteUpdate = true;
      state = ensureStateShape(remote.data);
      saveCache();
      renderAll();
      isRemoteUpdate = false;
      firstLoadDone = true;

      if (fromCache) setSyncStatus('offline');
      else if (!hasPending) setSyncStatus('synced');
    },
    (err) => { console.error(err); setSyncStatus('error'); }
  );
}

window.addEventListener('online', () => {
  if (syncStatus === 'offline') setSyncStatus('syncing');
});
window.addEventListener('offline', () => setSyncStatus('offline'));

/* ---------- HELPERS ---------- */

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fmt(n) {
  return '€' + Number(n || 0).toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso + 'T00:00:00').toLocaleDateString('es-ES', {day: '2-digit', month: 'short', year: 'numeric'});
}

function fmtDateShort(iso) {
  if (!iso) return '';
  return new Date(iso + 'T00:00:00').toLocaleDateString('es-ES', {day: '2-digit', month: 'short'});
}

function escapeHTML(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getTrip(id) {
  return state.trips.find(t => t.id === id);
}

function getCurrentTrip() {
  return getTrip(currentTripId);
}

function calcTripSpent(trip) {
  return trip.expenses.reduce((s, e) => s + (e.amount || 0), 0);
}

function calcTripChecklistProgress(trip) {
  const total = trip.checklist.length;
  const done = trip.checklist.filter(c => c.done).length;
  return { done, total };
}

function calcCategoryTotal(trip, categoryId) {
  return trip.expenses
    .filter(e => e.categoryId === categoryId)
    .reduce((s, e) => s + (e.amount || 0), 0);
}

let toastTimer;
function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 2200);
}

/* ---------- RENDER PRINCIPAL ---------- */

function renderAll() {
  if (currentTripId && getTrip(currentTripId)) {
    showTripDetail();
  } else {
    showTripsList();
  }
}

function showTripsList() {
  currentTripId = null;
  document.getElementById('tripsListSection').classList.remove('hidden');
  document.getElementById('tripDetail').classList.remove('active');
  document.getElementById('toolsSection').classList.remove('hidden');
  renderTripsList();
}

function showTripDetail() {
  document.getElementById('tripsListSection').classList.add('hidden');
  document.getElementById('tripDetail').classList.add('active');
  document.getElementById('toolsSection').classList.add('hidden');
  renderTripHeader();
  renderTab(currentTab);
}

/* ---------- LISTA DE VIAJES ---------- */

function renderTripsList() {
  const cont = document.getElementById('tripsContainer');
  if (state.trips.length === 0) {
    cont.innerHTML = `
      <div class="empty-state">
        Aún no tienes viajes planificados.<br>
        Pulsa <strong>+ Nuevo viaje</strong> para empezar.
      </div>
    `;
    return;
  }

  // Ordenar por fecha de inicio (próximos primero)
  const trips = [...state.trips].sort((a, b) => {
    if (!a.startDate) return 1;
    if (!b.startDate) return -1;
    return a.startDate.localeCompare(b.startDate);
  });

  cont.innerHTML = '<div class="trips-grid">' + trips.map(t => {
    const spent = calcTripSpent(t);
    const pct = t.budget > 0 ? Math.min(100, (spent / t.budget) * 100) : 0;
    const { done, total } = calcTripChecklistProgress(t);
    let barColor = 'var(--income)';
    if (pct >= 100) barColor = 'var(--expense)';
    else if (pct >= 80) barColor = 'var(--warning)';
    else if (pct >= 50) barColor = 'var(--info)';

    const datesStr = (t.startDate && t.endDate)
      ? `${fmtDateShort(t.startDate)} — ${fmtDateShort(t.endDate)} ${new Date(t.startDate).getFullYear()}`
      : (t.startDate ? fmtDate(t.startDate) : 'Sin fechas');

    return `
      <div class="trip-card" data-id="${t.id}">
        <div class="trip-card-actions">
          <button class="trip-card-action danger" data-action="delete" title="Eliminar">🗑️</button>
        </div>
        <div class="trip-card-header">
          <span class="trip-flag">${t.flag}</span>
          <span class="trip-name">${escapeHTML(t.name)}</span>
        </div>
        <div class="trip-dates">${datesStr}</div>
        <div class="trip-stat">
          <div class="trip-stat-label">Gastado</div>
          <div class="trip-stat-value">${fmt(spent)} / ${fmt(t.budget)} (${pct.toFixed(0)}%)</div>
          <div class="trip-bar">
            <div class="trip-bar-fill" style="width:${pct}%; background:${barColor};"></div>
          </div>
        </div>
        <div class="trip-stat">
          <div class="trip-stat-label">Trámites</div>
          <div class="trip-stat-value">${done} / ${total} ${total > 0 && done === total ? '✓' : ''}</div>
        </div>
      </div>
    `;
  }).join('') + '</div>';

  // Listeners
  cont.querySelectorAll('.trip-card').forEach(card => {
    const id = card.dataset.id;
    card.addEventListener('click', (ev) => {
      if (ev.target.closest('.trip-card-action')) return;
      currentTripId = id;
      currentTab = 'overview';
      renderAll();
    });
    const delBtn = card.querySelector('[data-action="delete"]');
    if (delBtn) delBtn.onclick = (ev) => {
      ev.stopPropagation();
      deleteTrip(id);
    };
  });
}

/* ---------- CREAR / EDITAR VIAJE ---------- */

function showAddTripModal(tripId = null) {
  const trip = tripId ? getTrip(tripId) : null;
  const isEdit = !!trip;

  const html = `
    <h2>${isEdit ? 'Editar viaje' : '+ Nuevo viaje'}</h2>
    <div class="form-group">
      <label>Nombre del destino</label>
      <input type="text" id="m_name" placeholder="Ej: Roma" value="${escapeHTML(trip?.name || '')}">
    </div>
    <div class="form-row-grid">
      <div class="form-group">
        <label>Bandera (emoji)</label>
        <input type="text" id="m_flag" placeholder="🇮🇹" value="${escapeHTML(trip?.flag || '🌍')}" maxlength="4">
      </div>
      <div class="form-group">
        <label>Viajeros</label>
        <input type="number" id="m_travelers" min="1" max="20" value="${trip?.travelers || 2}">
      </div>
    </div>
    <div class="form-row-grid">
      <div class="form-group">
        <label>Fecha inicio</label>
        <input type="date" id="m_start" value="${trip?.startDate || ''}">
      </div>
      <div class="form-group">
        <label>Fecha fin</label>
        <input type="date" id="m_end" value="${trip?.endDate || ''}">
      </div>
    </div>
    <div class="form-group">
      <label>Presupuesto total (€)</label>
      <input type="number" id="m_budget" step="0.01" min="0" value="${trip?.budget || ''}" placeholder="Ej: 1500">
    </div>
    ${!isEdit ? `
    <div class="form-group">
      <label>Plantilla de trámites (opcional)</label>
      <select id="m_template">
        <option value="">— Ninguna (empezar vacío) —</option>
        ${Object.entries(CHECKLIST_TEMPLATES).map(([k, v]) =>
          `<option value="${k}">${v.name}</option>`
        ).join('')}
      </select>
    </div>` : ''}
    <div class="modal-actions">
      <button class="btn" data-action="cancel">Cancelar</button>
      <button class="btn btn-primary" data-action="save">${isEdit ? 'Guardar' : 'Crear viaje'}</button>
    </div>
  `;

  openModal(html);

  document.querySelector('[data-action="cancel"]').onclick = closeModal;
  document.querySelector('[data-action="save"]').onclick = () => {
    const name = document.getElementById('m_name').value.trim();
    const flag = document.getElementById('m_flag').value.trim() || '🌍';
    const travelers = parseInt(document.getElementById('m_travelers').value) || 1;
    const start = document.getElementById('m_start').value;
    const end = document.getElementById('m_end').value;
    const budget = parseFloat(document.getElementById('m_budget').value) || 0;

    if (!name) { toast('Nombre requerido', true); return; }

    if (isEdit) {
      Object.assign(trip, {
        name, flag, travelers,
        startDate: start, endDate: end, budget
      });
    } else {
      const tpl = document.getElementById('m_template').value;
      const newTrip = {
        id: genId(),
        name, flag, travelers,
        startDate: start, endDate: end, budget,
        categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
        expenses: [],
        checklist: tpl && CHECKLIST_TEMPLATES[tpl]
          ? CHECKLIST_TEMPLATES[tpl].items.map(it => ({
              id: genId(),
              text: it.text,
              cat: it.cat,
              done: false,
              deadline: ''
            }))
          : [],
        notes: '',
        agenda: {},
        createdAt: Date.now()
      };
      state.trips.push(newTrip);
      currentTripId = newTrip.id;
      currentTab = 'overview';
    }

    saveState();
    closeModal();
    renderAll();
    toast(isEdit ? 'Viaje actualizado' : 'Viaje creado');
  };
}

function deleteTrip(id) {
  const t = getTrip(id);
  if (!t) return;
  if (!confirm(`¿Eliminar el viaje "${t.name}" y todos sus datos?\nEsta acción no se puede deshacer.`)) return;
  state.trips = state.trips.filter(x => x.id !== id);
  if (currentTripId === id) currentTripId = null;
  saveState();
  renderAll();
  toast('Viaje eliminado');
}

/* ---------- DETALLE: HEADER ---------- */

function renderTripHeader() {
  const trip = getCurrentTrip();
  if (!trip) return;
  const datesStr = (trip.startDate && trip.endDate)
    ? `${fmtDate(trip.startDate)} → ${fmtDate(trip.endDate)}`
    : (trip.startDate ? fmtDate(trip.startDate) : 'Sin fechas');

  const days = (trip.startDate && trip.endDate)
    ? Math.round((new Date(trip.endDate) - new Date(trip.startDate)) / 86400000) + 1
    : 0;

  const el = document.getElementById('tripHeader');
  el.innerHTML = `
    <div class="trip-detail-title">
      <span style="font-size:1.6rem;">${trip.flag}</span>
      <span>${escapeHTML(trip.name)}</span>
      <button class="btn btn-sm" id="editTripBtn" style="margin-left:auto;">✏️ Editar</button>
    </div>
    <div class="trip-detail-meta">
      <span class="trip-detail-meta-item">📅 ${datesStr}${days ? ` · ${days} días` : ''}</span>
      <span class="trip-detail-meta-item">👥 ${trip.travelers} ${trip.travelers === 1 ? 'viajero' : 'viajeros'}</span>
      <span class="trip-detail-meta-item">💰 Presupuesto ${fmt(trip.budget)}</span>
    </div>
  `;
  document.getElementById('editTripBtn').onclick = () => showAddTripModal(trip.id);
}

/* ---------- TABS ---------- */

function renderTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.dataset.tabContent === tabName));

  if (tabName === 'overview') renderOverview();
  else if (tabName === 'expenses') renderExpenses();
  else if (tabName === 'checklist') renderChecklist();
  else if (tabName === 'agenda') renderAgenda();
  else if (tabName === 'notes') renderNotes();
}

/* ---------- TAB: OVERVIEW ---------- */

function renderOverview() {
  const trip = getCurrentTrip();
  if (!trip) return;
  const spent = calcTripSpent(trip);
  const remaining = trip.budget - spent;
  const pct = trip.budget > 0 ? (spent / trip.budget) * 100 : 0;
  const { done, total } = calcTripChecklistProgress(trip);
  const checklistPct = total > 0 ? (done / total) * 100 : 0;

  // Días hasta el viaje
  let daysToTrip = '';
  if (trip.startDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(trip.startDate + 'T00:00:00');
    const diff = Math.round((start - today) / 86400000);
    if (diff > 0) daysToTrip = `Faltan ${diff} días`;
    else if (diff === 0) daysToTrip = '¡Es hoy! 🎉';
    else if (diff >= -30) daysToTrip = 'En curso o reciente';
    else daysToTrip = 'Viaje pasado';
  }

  // Trámites urgentes (deadline próximo y no hechos)
  const upcomingTramites = trip.checklist
    .filter(c => !c.done && c.deadline)
    .sort((a, b) => a.deadline.localeCompare(b.deadline))
    .slice(0, 3);

  const balanceClass = remaining >= 0 ? 'positive' : 'negative';

  document.getElementById('tabOverview').innerHTML = `
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-card-label">💰 Gastado</div>
        <div class="summary-card-value">${fmt(spent)}</div>
        <div class="summary-card-sub">de ${fmt(trip.budget)} (${pct.toFixed(0)}%)</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">${remaining >= 0 ? '🟢 Queda' : '🔴 Pasado'}</div>
        <div class="summary-card-value ${balanceClass}">${fmt(Math.abs(remaining))}</div>
        <div class="summary-card-sub">${daysToTrip || ''}</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">✅ Trámites</div>
        <div class="summary-card-value">${done}/${total}</div>
        <div class="summary-card-sub">${total > 0 ? checklistPct.toFixed(0) + '% completados' : 'Sin trámites'}</div>
      </div>
    </div>

    ${upcomingTramites.length > 0 ? `
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">⏰ Próximos trámites con fecha límite</h2>
        </div>
        ${upcomingTramites.map(c => renderChecklistRow(c, true)).join('')}
      </div>
    ` : ''}

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">📊 Gasto por categoría</h2>
      </div>
      ${renderCategoriesSummaryHtml(trip)}
    </div>
  `;
}

function renderCategoriesSummaryHtml(trip) {
  const totals = trip.categories.map(c => ({
    ...c,
    total: calcCategoryTotal(trip, c.id)
  }));
  const grandTotal = totals.reduce((s, t) => s + t.total, 0);
  if (grandTotal === 0) {
    return '<div class="empty-state">Aún no has registrado gastos.</div>';
  }
  return '<div class="categories-summary">' +
    totals.filter(c => c.total > 0).map(c => {
      const pct = grandTotal > 0 ? (c.total / grandTotal) * 100 : 0;
      return `
        <div class="cat-summary-card">
          <div class="cat-summary-name">
            <span>${c.icon} ${escapeHTML(c.name)}</span>
            <span style="color:var(--text-faint); font-size:0.7rem;">${pct.toFixed(0)}%</span>
          </div>
          <div class="cat-summary-amount">${fmt(c.total)}</div>
        </div>
      `;
    }).join('') + '</div>';
}

/* ---------- TAB: EXPENSES ---------- */

function renderExpenses() {
  const trip = getCurrentTrip();
  if (!trip) return;
  const spent = calcTripSpent(trip);
  document.getElementById('expensesTotal').textContent = fmt(spent);

  // Resumen por categoría
  document.getElementById('categoriesSummary').innerHTML = renderCategoriesSummaryHtml(trip).replace(/^<div class="categories-summary">|<\/div>$/g, '');

  // Filter bar
  const filterBar = document.getElementById('expensesFilterBar');
  const allCats = [{id:'all', name:'Todas', icon:'🌐'}, ...trip.categories];
  filterBar.innerHTML = allCats.map(c => `
    <button class="filter-pill ${expenseFilter === c.id ? 'active' : ''}" data-cat-filter="${c.id}">
      ${c.icon} ${escapeHTML(c.name)}
    </button>
  `).join('');
  filterBar.querySelectorAll('[data-cat-filter]').forEach(b => {
    b.onclick = () => {
      expenseFilter = b.dataset.catFilter;
      renderExpenses();
    };
  });

  // Lista de gastos
  const cont = document.getElementById('expensesContainer');
  let visibleExpenses = trip.expenses;
  if (expenseFilter !== 'all') {
    visibleExpenses = visibleExpenses.filter(e => e.categoryId === expenseFilter);
  }

  if (visibleExpenses.length === 0) {
    cont.innerHTML = `<div class="empty-state">${trip.expenses.length === 0 ? 'Aún no has añadido gastos.' : 'Sin gastos en esta categoría.'}</div>`;
  } else {
    cont.innerHTML = visibleExpenses.map(e => {
      const cat = trip.categories.find(c => c.id === e.categoryId) || {name:'?', icon:'❓'};
      return `
        <div class="item-row ${e.done ? 'done' : ''}" data-id="${e.id}">
          <button class="check-btn ${e.done ? 'checked' : ''}" data-action="toggle-done" title="${e.done ? 'Marcar pendiente' : 'Marcar pagado'}">${e.done ? '✓' : ''}</button>
          <span class="item-cat-tag" data-action="edit-cat" title="Cambiar categoría">${cat.icon} ${escapeHTML(cat.name)}</span>
          <div class="item-concept" data-action="edit-concept">${escapeHTML(e.concept)}</div>
          <div class="item-amount" data-action="edit-amount">${fmt(e.amount)}</div>
          <button class="item-delete" data-action="delete" title="Eliminar">✕</button>
        </div>
      `;
    }).join('');

    cont.querySelectorAll('.item-row').forEach(row => {
      const id = row.dataset.id;
      row.querySelector('[data-action="toggle-done"]').onclick = () => toggleExpenseDone(id);
      row.querySelector('[data-action="edit-cat"]').onclick = () => editExpenseCategory(id);
      row.querySelector('[data-action="edit-concept"]').onclick = () => editExpense(id, 'concept');
      row.querySelector('[data-action="edit-amount"]').onclick = () => editExpense(id, 'amount');
      row.querySelector('[data-action="delete"]').onclick = () => deleteExpense(id);
    });
  }
}

function toggleExpenseDone(id) {
  const trip = getCurrentTrip();
  const e = trip.expenses.find(x => x.id === id);
  if (!e) return;
  e.done = !e.done;
  saveState();
  renderExpenses();
}

function editExpenseCategory(id) {
  const trip = getCurrentTrip();
  const e = trip.expenses.find(x => x.id === id);
  if (!e) return;
  const opts = trip.categories.map(c => `${c.icon} ${c.name}`);
  const current = trip.categories.findIndex(c => c.id === e.categoryId);
  const choice = prompt(`Categoría:\n${opts.map((o, i) => `${i+1}) ${o}`).join('\n')}\n\nEscribe el número:`, current + 1);
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (idx >= 0 && idx < trip.categories.length) {
    e.categoryId = trip.categories[idx].id;
    saveState();
    renderExpenses();
    renderTripHeader();
  }
}

function editExpense(id, field) {
  const trip = getCurrentTrip();
  const e = trip.expenses.find(x => x.id === id);
  if (!e) return;
  const row = document.querySelector(`#expensesContainer .item-row[data-id="${id}"]`);
  const el = row.querySelector(field === 'concept' ? '[data-action="edit-concept"]' : '[data-action="edit-amount"]');
  const original = el.textContent;
  const current = e[field];

  if (field === 'concept') {
    el.innerHTML = `<input type="text" class="inline-edit" value="${escapeHTML(current)}" id="exInput">`;
  } else {
    el.innerHTML = `<input type="number" step="0.01" class="inline-edit inline-edit-amount" value="${current}" id="exInput">`;
  }
  const input = document.getElementById('exInput');
  input.focus();
  input.select();

  const finish = (save) => {
    if (save) {
      const val = field === 'amount' ? parseFloat(input.value) : input.value.trim();
      if (field === 'amount' && !isNaN(val)) { e.amount = val; saveState(); renderExpenses(); toast('Actualizado'); return; }
      if (field === 'concept' && val) { e.concept = val; saveState(); renderExpenses(); toast('Actualizado'); return; }
    }
    el.textContent = original;
  };
  input.onblur = () => finish(true);
  input.onkeydown = (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { input.onblur = null; finish(false); }
  };
}

function deleteExpense(id) {
  const trip = getCurrentTrip();
  if (!confirm('¿Eliminar este gasto?')) return;
  trip.expenses = trip.expenses.filter(e => e.id !== id);
  saveState();
  renderExpenses();
  renderTripHeader();
  toast('Eliminado');
}

function showAddExpenseForm() {
  const trip = getCurrentTrip();
  const form = document.getElementById('expenseForm');
  form.classList.remove('hidden');
  form.innerHTML = `
    <div class="form-row">
      <select id="newExpCat">
        ${trip.categories.map(c => `<option value="${c.id}">${c.icon} ${escapeHTML(c.name)}</option>`).join('')}
      </select>
      <input type="text" placeholder="Concepto (ej: Vuelo Madrid-Roma)" id="newExpConcept" autofocus>
      <input type="number" step="0.01" placeholder="Importe" id="newExpAmount">
      <button class="btn btn-primary btn-sm" id="saveNewExp">Añadir</button>
      <button class="btn btn-sm" id="cancelNewExp">✕</button>
    </div>
  `;
  document.getElementById('newExpConcept').focus();
  document.getElementById('saveNewExp').onclick = () => {
    const cat = document.getElementById('newExpCat').value;
    const c = document.getElementById('newExpConcept').value.trim();
    const a = parseFloat(document.getElementById('newExpAmount').value);
    if (!c || isNaN(a)) { toast('Concepto e importe requeridos', true); return; }
    trip.expenses.push({ id: genId(), categoryId: cat, concept: c, amount: a, done: false });
    saveState();
    form.classList.add('hidden');
    renderExpenses();
    renderTripHeader();
    toast('Añadido');
  };
  document.getElementById('cancelNewExp').onclick = () => {
    form.classList.add('hidden');
    form.innerHTML = '';
  };
  document.getElementById('newExpAmount').onkeydown = (ev) => {
    if (ev.key === 'Enter') document.getElementById('saveNewExp').click();
  };
}

/* ---------- GESTIÓN CATEGORÍAS ---------- */

function showManageCategoriesModal() {
  const trip = getCurrentTrip();
  const html = `
    <h2>⚙️ Gestionar categorías</h2>
    <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:14px;">
      Estas categorías son específicas de este viaje. Si eliminas una con gastos asociados, esos gastos pasarán a "Otros".
    </p>
    <div id="catList"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-sm" id="addCatBtn">+ Nueva categoría</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" data-action="close">Cerrar</button>
    </div>
  `;
  openModal(html);

  function renderCatList() {
    document.getElementById('catList').innerHTML = trip.categories.map(c => `
      <div class="item-row" data-cat-id="${c.id}">
        <input type="text" class="inline-edit" style="max-width:50px;" data-field="icon" value="${escapeHTML(c.icon)}" maxlength="3">
        <input type="text" class="inline-edit" data-field="name" value="${escapeHTML(c.name)}">
        <button class="item-delete" data-action="delete-cat" title="Eliminar">✕</button>
      </div>
    `).join('');

    document.querySelectorAll('#catList .item-row').forEach(row => {
      const id = row.dataset.catId;
      const cat = trip.categories.find(c => c.id === id);
      row.querySelector('[data-field="icon"]').onchange = (ev) => {
        cat.icon = ev.target.value || '📌';
        saveState();
      };
      row.querySelector('[data-field="name"]').onchange = (ev) => {
        cat.name = ev.target.value.trim() || 'Sin nombre';
        saveState();
      };
      row.querySelector('[data-action="delete-cat"]').onclick = () => {
        if (trip.categories.length <= 1) { toast('Debe quedar al menos una categoría', true); return; }
        if (!confirm('¿Eliminar esta categoría?')) return;
        // mover gastos a "Otros" o primera disponible
        const fallback = trip.categories.find(c => c.id !== id);
        trip.expenses.forEach(e => {
          if (e.categoryId === id) e.categoryId = fallback.id;
        });
        trip.categories = trip.categories.filter(c => c.id !== id);
        saveState();
        renderCatList();
      };
    });
  }
  renderCatList();

  document.getElementById('addCatBtn').onclick = () => {
    const name = prompt('Nombre de la nueva categoría:');
    if (!name) return;
    const icon = prompt('Emoji para esta categoría:', '📌') || '📌';
    trip.categories.push({ id: genId(), name: name.trim(), icon: icon.trim() });
    saveState();
    renderCatList();
  };

  document.querySelector('[data-action="close"]').onclick = () => {
    closeModal();
    renderExpenses();
  };
}

/* ---------- EXPORTAR AL PRESUPUESTO FAMILIAR ---------- */

function exportToFamilyBudget() {
  const trip = getCurrentTrip();
  const spent = calcTripSpent(trip);
  if (spent === 0) { toast('No hay gastos que exportar', true); return; }

  // Determinar mes
  const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  let monthIdx = trip.startDate ? new Date(trip.startDate).getMonth() : new Date().getMonth();

  const concept = `Viaje ${trip.flag} ${trip.name}`;

  // Preparamos el JSON parcial para que el usuario pueda copiarlo
  const html = `
    <h2>📤 Exportar al presupuesto familiar</h2>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-bottom:14px;">
      Esto añadirá un único <strong>gasto puntual</strong> al presupuesto familiar con el total del viaje.
    </p>
    <div class="form-group">
      <label>Concepto</label>
      <input type="text" id="exp_concept" value="${escapeHTML(concept)}">
    </div>
    <div class="form-group">
      <label>Importe total</label>
      <input type="number" step="0.01" id="exp_amount" value="${spent.toFixed(2)}">
    </div>
    <div class="form-group">
      <label>Mes destino</label>
      <select id="exp_month">
        ${monthNames.map((m, i) => `<option value="${i}" ${i === monthIdx ? 'selected' : ''}>${m.charAt(0).toUpperCase() + m.slice(1)}</option>`).join('')}
      </select>
    </div>
    <p style="color:var(--text-faint); font-size:0.78rem;">
      ⚠️ La sincronización con el presupuesto familiar es <strong>una operación de un solo sentido</strong>. Si más adelante editas gastos del viaje, no se actualizará automáticamente. Tendrás que repetir la exportación o ajustar manualmente.
    </p>
    <div class="modal-actions">
      <button class="btn" data-action="cancel">Cancelar</button>
      <button class="btn btn-primary" data-action="confirm">Exportar</button>
    </div>
  `;
  openModal(html);

  document.querySelector('[data-action="cancel"]').onclick = closeModal;
  document.querySelector('[data-action="confirm"]').onclick = async () => {
    const c = document.getElementById('exp_concept').value.trim();
    const a = parseFloat(document.getElementById('exp_amount').value);
    const m = parseInt(document.getElementById('exp_month').value);
    if (!c || isNaN(a) || a <= 0) { toast('Datos inválidos', true); return; }

    // Cargar el doc del presupuesto familiar y añadir el gasto puntual
    try {
      const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js");
      const familyRef = doc(db, 'presupuesto', 'principal');
      const snap = await getDoc(familyRef);
      if (!snap.exists()) {
        toast('No se encontró el presupuesto familiar', true);
        return;
      }
      const familyData = snap.data().data || {};
      if (!familyData.months) {
        toast('Estructura del presupuesto familiar no válida', true);
        return;
      }
      const monthName = monthNames[m];
      if (!familyData.months[monthName]) {
        familyData.months[monthName] = { puntuales: [] };
      }
      if (!Array.isArray(familyData.months[monthName].puntuales)) {
        familyData.months[monthName].puntuales = [];
      }
      familyData.months[monthName].puntuales.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
        concept: c,
        amount: a,
        done: false
      });

      await setDoc(familyRef, {
        data: familyData,
        lastUpdated: Date.now(),
        updatedBy: getClientId()
      });

      closeModal();
      toast(`Exportado a ${monthName} (presupuesto familiar)`);
    } catch (err) {
      console.error(err);
      toast('Error al exportar: ' + err.message, true);
    }
  };
}

function renderChecklist() {
  const trip = getCurrentTrip();
  if (!trip) return;
  const { done, total } = calcTripChecklistProgress(trip);
  document.getElementById('checklistProgress').textContent = `${done}/${total}`;

  const cont = document.getElementById('checklistContainer');
  if (trip.checklist.length === 0) {
    cont.innerHTML = `
      <div class="empty-state">
        Aún no hay trámites en la lista.<br>
        Pulsa <strong>+ Añadir trámite</strong> o <strong>📋 Cargar plantilla</strong>.
      </div>
    `;
    return;
  }

  // Ordenar: pendientes primero, dentro de pendientes los con deadline más cercano
  const sorted = [...trip.checklist].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if (a.deadline) return -1;
    if (b.deadline) return 1;
    return 0;
  });

  cont.innerHTML = sorted.map(c => renderChecklistRow(c)).join('');

  // Listeners
  cont.querySelectorAll('.item-row').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('[data-action="toggle-done"]').onclick = () => toggleChecklistDone(id);
    row.querySelector('[data-action="edit-text"]').onclick = () => editChecklistField(id, 'text');
    const deadlineBtn = row.querySelector('[data-action="edit-deadline"]');
    if (deadlineBtn) deadlineBtn.onclick = () => editChecklistDeadline(id);
    row.querySelector('[data-action="delete"]').onclick = () => deleteChecklistItem(id);
  });
}

function renderChecklistRow(c, readonly = false) {
  // Calcular badge de deadline
  let deadlineHtml = '';
  if (c.deadline) {
    const today = new Date(); today.setHours(0,0,0,0);
    const dl = new Date(c.deadline + 'T00:00:00');
    const diff = Math.round((dl - today) / 86400000);
    let cls = 'future', txt = fmtDateShort(c.deadline);
    if (c.done) { cls = 'passed'; }
    else if (diff < 0) { cls = 'urgent'; txt = `vencido (${fmtDateShort(c.deadline)})`; }
    else if (diff === 0) { cls = 'urgent'; txt = '¡hoy!'; }
    else if (diff <= 7) { cls = 'urgent'; txt = `${diff}d (${fmtDateShort(c.deadline)})`; }
    else if (diff <= 30) { cls = 'soon'; txt = `${diff}d`; }
    else { txt = fmtDateShort(c.deadline); }
    deadlineHtml = `<span class="deadline-badge ${cls}" data-action="edit-deadline" style="cursor:pointer;" title="Cambiar fecha límite">⏰ ${txt}</span>`;
  } else if (!readonly) {
    deadlineHtml = `<span class="deadline-badge future" data-action="edit-deadline" style="cursor:pointer; opacity:0.5;" title="Añadir fecha límite">+ fecha</span>`;
  }

  return `
    <div class="item-row ${c.done ? 'done' : ''}" data-id="${c.id}">
      <button class="check-btn ${c.done ? 'checked' : ''}" data-action="toggle-done" title="${c.done ? 'Marcar pendiente' : 'Marcar hecho'}">${c.done ? '✓' : ''}</button>
      <div class="item-concept" data-action="edit-text" style="cursor:${readonly ? 'default' : 'pointer'}">${escapeHTML(c.text)}${c.cat ? ` <span style="color:var(--text-faint);font-size:0.78rem;">· ${escapeHTML(c.cat)}</span>` : ''}</div>
      ${deadlineHtml}
      ${readonly ? '' : `<button class="item-delete" data-action="delete" title="Eliminar">✕</button>`}
    </div>
  `;
}

function toggleChecklistDone(id) {
  const trip = getCurrentTrip();
  const c = trip.checklist.find(x => x.id === id);
  if (!c) return;
  c.done = !c.done;

function editChecklistField(id, field) {
  const trip = getCurrentTrip();
  const c = trip.checklist.find(x => x.id === id);
  if (!c) return;
  const newVal = prompt('Editar:', c[field] || '');
  if (newVal === null) return;
  c[field] = newVal.trim();
  saveState();
  renderChecklist();
}

function editChecklistDeadline(id) {
  const trip = getCurrentTrip();
  const c = trip.checklist.find(x => x.id === id);
  if (!c) return;
  const newVal = prompt('Fecha límite (YYYY-MM-DD, vacío para quitar):', c.deadline || '');
  if (newVal === null) return;
  if (newVal.trim() === '') {
    c.deadline = '';
  } else if (/^\d{4}-\d{2}-\d{2}$/.test(newVal.trim())) {
    c.deadline = newVal.trim();
  } else {
    toast('Formato inválido (usa YYYY-MM-DD)', true);
    return;
  }
  saveState();
  renderChecklist();
}

function deleteChecklistItem(id) {
  const trip = getCurrentTrip();

  trip.checklist = trip.checklist.filter(c => c.id !== id);

/* ---------- TAB: AGENDA ---------- */

// Genera la lista de fechas del viaje (YYYY-MM-DD) en orden
function getTripDays(trip) {
  if (!trip.startDate || !trip.endDate) return [];
  const days = [];
  const start = new Date(trip.startDate + 'T00:00:00');
  const end = new Date(trip.endDate + 'T00:00:00');
  if (end < start) return [];
  let cur = new Date(start);
  while (cur <= end) {
    days.push(toISO(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function toISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function fmtDayLong(iso) {
  const d = new Date(iso + 'T00:00:00');
  const wd = d.toLocaleDateString('es-ES', { weekday: 'short' });
  const day = d.getDate();
  const mo = d.toLocaleDateString('es-ES', { month: 'short' });
  return { weekday: wd, dayMonth: `${day} ${mo}` };
}

function ensureDayEntry(trip, dayISO) {
  if (!trip.agenda[dayISO]) {
    trip.agenda[dayISO] = { text: '', activities: [] };
  }
  return trip.agenda[dayISO];
}

function getExpensesForDay(trip, dayISO) {
  return trip.expenses.filter(e => e.dayDate === dayISO);
}

function calcDayTotal(trip, dayISO) {
  return getExpensesForDay(trip, dayISO).reduce((s, e) => s + (e.amount || 0), 0);
}

function renderAgenda() {
  const trip = getCurrentTrip();
  if (!trip) return;
  const cont = document.getElementById('tabAgenda');
  const days = getTripDays(trip);

  if (days.length === 0) {
    cont.innerHTML = `
      <div class="section">
        <div class="day-no-dates">
          Para ver la agenda necesitas establecer las fechas del viaje.<br>
          Pulsa <strong>✏️ Editar</strong> arriba y pon fecha de inicio y fin.
        </div>
      </div>
    `;
    return;
  }

  // Stats
  const todayISO = toISO(new Date());
  const totalDays = days.length;
  const totalActivities = days.reduce((s, d) => s + (trip.agenda[d]?.activities.length || 0), 0);
  const doneActivities = days.reduce((s, d) => s + (trip.agenda[d]?.activities.filter(a => a.done).length || 0), 0);
  const assignedExpenses = trip.expenses.filter(e => e.dayDate).length;
  const totalExpenses = trip.expenses.length;

  cont.innerHTML = `
    <div class="agenda-stats">
      <div class="agenda-stat-item">
        <span class="agenda-stat-label">Duración</span>
        <span class="agenda-stat-value">${totalDays} ${totalDays === 1 ? 'día' : 'días'}</span>
      </div>
      <div class="agenda-stat-item">
        <span class="agenda-stat-label">Actividades</span>
        <span class="agenda-stat-value">${doneActivities}/${totalActivities}</span>
      </div>
      <div class="agenda-stat-item">
        <span class="agenda-stat-label">Gastos asignados</span>
        <span class="agenda-stat-value">${assignedExpenses}/${totalExpenses}</span>
      </div>
    </div>
    <div class="agenda-grid" id="agendaGrid"></div>
  `;

  const grid = document.getElementById('agendaGrid');
  days.forEach((dayISO, idx) => {
    const day = ensureDayEntry(trip, dayISO);
    const isToday = dayISO === todayISO;
    const isPast = dayISO < todayISO;
    const dayExpenses = getExpensesForDay(trip, dayISO);
    const dayTotal = calcDayTotal(trip, dayISO);
    const dt = fmtDayLong(dayISO);

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '') + (isPast && !isToday ? ' past' : '');
    card.dataset.day = dayISO;

    card.innerHTML = `
      <div class="day-header">
        <div>
          <div class="day-number">Día ${idx + 1}</div>
          <div class="day-date">
            <span class="day-date-weekday">${dt.weekday}</span>${dt.dayMonth}
          </div>
        </div>
        ${isToday ? '<div class="day-today-badge">Hoy</div>' : ''}
      </div>

      <textarea
        class="day-textarea"
        data-action="edit-text"
        placeholder="Notas del día (lugares, horarios, comidas...)"
      >${escapeHTML(day.text)}</textarea>

      <div>
        <div class="day-section-label">Actividades</div>
        <div class="day-activities-list" data-day="${dayISO}">
          ${day.activities.length === 0
            ? '<div style="color:var(--text-faint); font-size:0.78rem; padding:4px 0; font-style:italic;">Sin actividades</div>'
            : day.activities.map(a => `
              <div class="day-activity-row ${a.done ? 'done' : ''}" data-aid="${a.id}">
                <button class="check-btn check-btn-sm ${a.done ? 'checked' : ''}" data-action="toggle-act" title="Marcar como hecho">${a.done ? '✓' : ''}</button>
                <span class="day-activity-text" data-action="edit-act">${escapeHTML(a.text)}</span>
                <button class="day-activity-delete" data-action="del-act" title="Eliminar">✕</button>
              </div>
            `).join('')}
        </div>
        <button class="day-add-activity" data-action="add-activity">+ Añadir actividad</button>
      </div>

      ${dayExpenses.length > 0 ? `
        <div>
          <div class="day-section-label">💰 Gastos del día</div>
          <div class="day-expenses-list">
            ${dayExpenses.map(e => {
              const cat = trip.categories.find(c => c.id === e.categoryId) || {icon:'❓'};
              return `
                <div class="day-expense-row">
                  <span class="day-expense-name">${cat.icon} ${escapeHTML(e.concept)}</span>
                  <span class="day-expense-amount">${fmt(e.amount)}</span>
                </div>
              `;
            }).join('')}
            <div class="day-expenses-total">
              <span>Total</span>
              <span>${fmt(dayTotal)}</span>
            </div>
          </div>
        </div>
      ` : ''}

      <button class="day-add-activity" data-action="assign-expense" style="margin-top:auto;">+ Asignar gasto a este día</button>
    `;

    // Listeners de la tarjeta
    const textarea = card.querySelector('[data-action="edit-text"]');
    let textDebounce = null;
    textarea.addEventListener('input', () => {
      day.text = textarea.value;
      clearTimeout(textDebounce);
      textDebounce = setTimeout(() => saveState(), 500);
    });

    card.querySelector('[data-action="add-activity"]').onclick = () => addActivityToDay(dayISO);
    card.querySelector('[data-action="assign-expense"]').onclick = () => showAssignExpenseModal(dayISO);

    card.querySelectorAll('.day-activity-row').forEach(row => {
      const aid = row.dataset.aid;
      row.querySelector('[data-action="toggle-act"]').onclick = () => toggleActivity(dayISO, aid);
      row.querySelector('[data-action="edit-act"]').onclick = () => editActivity(dayISO, aid);
      row.querySelector('[data-action="del-act"]').onclick = () => deleteActivity(dayISO, aid);
    });

    grid.appendChild(card);
  });
}

function addActivityToDay(dayISO) {
  const text = prompt('Nueva actividad:');
  if (!text || !text.trim()) return;
  const trip = getCurrentTrip();
  const day = ensureDayEntry(trip, dayISO);
  day.activities.push({
    id: genId(),
    text: text.trim(),
    done: false
  });
  saveState();
  renderAgenda();
}

function toggleActivity(dayISO, aid) {
  const trip = getCurrentTrip();
  const day = trip.agenda[dayISO];
  if (!day) return;
  const a = day.activities.find(x => x.id === aid);
  if (!a) return;
  a.done = !a.done;
  saveState();
  renderAgenda();
}

function editActivity(dayISO, aid) {
  const trip = getCurrentTrip();
  const day = trip.agenda[dayISO];
  if (!day) return;
  const a = day.activities.find(x => x.id === aid);
  if (!a) return;
  const newText = prompt('Editar actividad:', a.text);
  if (newText === null) return;
  if (!newText.trim()) {
    if (!confirm('¿Eliminar esta actividad?')) return;
    day.activities = day.activities.filter(x => x.id !== aid);
  } else {
    a.text = newText.trim();
  }
  saveState();
  renderAgenda();
}

function deleteActivity(dayISO, aid) {
  const trip = getCurrentTrip();
  const day = trip.agenda[dayISO];
  if (!day) return;
  if (!confirm('¿Eliminar esta actividad?')) return;
  day.activities = day.activities.filter(x => x.id !== aid);
  saveState();
  renderAgenda();
}

function showAssignExpenseModal(dayISO) {
  const trip = getCurrentTrip();
  const dt = fmtDayLong(dayISO);
  // Gastos no asignados a ningún día + los ya asignados a este día (para poder desasignar)
  const candidates = trip.expenses.filter(e => !e.dayDate || e.dayDate === dayISO);

  const html = `
    <h2>Asignar gasto a ${dt.weekday} ${dt.dayMonth}</h2>
    <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:14px;">
      Marca los gastos que pertenezcan a este día. Los gastos sin día asignado aparecen abajo.
    </p>

    ${candidates.length === 0 ? `
      <div class="empty-state">
        No hay gastos para asignar. Añade gastos primero en la pestaña "Gastos".
      </div>
    ` : `
      <div class="day-pick-list">
        ${candidates.map(e => {
          const cat = trip.categories.find(c => c.id === e.categoryId) || {icon:'❓', name:''};
          const assigned = e.dayDate === dayISO;
          return `
            <div class="day-pick-item ${assigned ? 'selected' : ''}" data-eid="${e.id}">
              <input type="checkbox" ${assigned ? 'checked' : ''} style="cursor:pointer;">
              <div class="day-pick-item-name">
                <div>${cat.icon} ${escapeHTML(e.concept)}</div>
                <div class="day-pick-item-meta">${escapeHTML(cat.name)}</div>
              </div>
              <div class="day-expense-amount">${fmt(e.amount)}</div>
            </div>
          `;
        }).join('')}
      </div>
    `}

    <div style="margin-top:14px; padding:10px; background:var(--bg-elevated); border-radius:var(--radius-sm); font-size:0.85rem; color:var(--text-dim);">
      💡 Si necesitas añadir un gasto nuevo, ciérralo y ve a la pestaña "Gastos".
    </div>

    <div class="modal-actions">
      <button class="btn" data-action="cancel">Cancelar</button>
      <button class="btn btn-primary" data-action="apply">Aplicar</button>
    </div>
  `;

  openModal(html);

  // Toggle visual
  document.querySelectorAll('.day-pick-item').forEach(item => {
    item.addEventListener('click', () => {
      const cb = item.querySelector('input[type="checkbox"]');
      cb.checked = !cb.checked;
      item.classList.toggle('selected', cb.checked);
    });
  });

  document.querySelector('[data-action="cancel"]').onclick = closeModal;
  document.querySelector('[data-action="apply"]').onclick = () => {
    document.querySelectorAll('.day-pick-item').forEach(item => {
      const eid = item.dataset.eid;
      const checked = item.querySelector('input[type="checkbox"]').checked;
      const exp = trip.expenses.find(x => x.id === eid);
      if (!exp) return;
      if (checked) exp.dayDate = dayISO;
      else if (exp.dayDate === dayISO) exp.dayDate = '';
    });
    saveState();
    closeModal();
    renderAgenda();
    toast('Gastos actualizados');
  };
}

/* ---------- EXPORT / IMPORT ---------- */

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vacaciones-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Datos exportados');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.trips) throw new Error('Archivo inválido');
      state = ensureStateShape(parsed);
      saveState();
      renderAll();
      toast('Datos importados');
    } catch (err) {
      toast('Error: archivo inválido', true);
    }
  };
  reader.readAsText(file);
}
